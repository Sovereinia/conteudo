name: Deploy to VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Deploys the static site to the VM. nginx serves it at https://sovereinia.org/.
# /guia/ is deployed by Sovereinia/guia and is excluded from --delete.
# DEPLOY_HOST secret = direct SSH host (not Cloudflare orange-cloud apex). Never commit IPs.
env:
  DEPLOY_PATH: "/srv/apps/sovereinia/"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_HOST:-}" ]; then
            echo "DEPLOY_HOST secret is required (direct SSH host; not CF-proxied apex)"; exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SCAN_HOST="${DEPLOY_HOST##*@}"
          ssh-keyscan -H "$SCAN_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          if [ ! -s ~/.ssh/deploy_key ]; then
            echo "Private key is missing or empty"; exit 1
          fi

      - name: Deploy site to VM
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'deploy' }}
        run: |
          set -euo pipefail
          HOST="${DEPLOY_HOST##*@}"
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'README.md' \
            --exclude 'guia/' \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes" \
            ./ "${DEPLOY_USER}@${HOST}:${DEPLOY_PATH}"

      - name: Smoke test
        run: |
          for path in / /blog/ /sobre/; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "https://sovereinia.org${path}")
            echo "GET ${path} -> ${code}"
            test "$code" = "200"
          done

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
