name: Deploy to VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Deploys the static site (this repo) to the VM. nginx serves it at https://sovereinia.org/.
# The /guia/ subdirectory is deployed independently by the Sovereinia/guia repo, so it is
# excluded here and protected from --delete.
env:
  DEPLOY_HOST: "sovereinia.org"
  DEPLOY_USER: "deploy"
  DEPLOY_PATH: "/srv/apps/sovereinia/"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          if [ ! -s ~/.ssh/deploy_key ]; then
            echo "Private key is missing or empty"; exit 1
          fi

      - name: Deploy site to VM
        run: |
          # Mirror the repo (minus VCS/CI/meta files) to the serving directory.
          # --delete keeps the remote a clean mirror; excluded paths are also protected
          # from deletion, so the separately-deployed guia/ subdir stays intact.
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'README.md' \
            --exclude 'guia/' \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes" \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}"

      - name: Smoke test
        run: |
          for path in / /blog/ /sobre/; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "https://sovereinia.org${path}")
            echo "GET ${path} -> ${code}"
            test "$code" = "200"
          done

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
